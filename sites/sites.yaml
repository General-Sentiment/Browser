rules:
  - name: YouTube
    enabled: false
    matches:
      - "*://www.youtube.com/*"
    css:
      - sites/youtube/style.css
    js:
      - sites/youtube/script.js

  - name: Instagram
    enabled: false
    matches:
      - "*://www.instagram.com/*"
    css:
      - sites/instagram/style.css
    js:
      - sites/instagram/script.js
